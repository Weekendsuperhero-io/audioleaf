[package]
name = "audioleaf"
version = "3.2.0"
edition = "2021"
authors = ["Antoni Zasada", "weekendsuperhero"]
description = "Manage your Nanoleaf devices (Canvas, Shapes, Elements, Light Panels) and visualize music straight from the terminal"
keywords = ["nanoleaf", "audio", "music", "visualizer"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/weekendsuperhero/audioleaf"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.86"
clap = { version = "4.5.16", features = ["derive"] }
cpal = "0.16.0"
dasp_sample = "0.11.0"
dirs = "6.0.0"
num-complex = "0.4.6"
palette = "0.7.6"
ratatui = "0.29.0"
reqwest = { version = "0.12.24", features = ["blocking", "json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
toml = "0.9.8"

[profile.release]
panic = "abort"

[profile.dev]
panic = "abort"
