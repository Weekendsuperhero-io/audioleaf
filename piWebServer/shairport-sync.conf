  general = {
    name = "Audioleaf Pi";
    output_backend = "alsa";
    interpolation = "auto";
    // Increase backend buffer modestly to reduce dropouts/XRUNs on busy Pi/network links.
    audio_backend_buffer_desired_length_in_seconds = 0.4;
  };

  alsa = {
    output_device = "hw:Loopback,0,0";
    // Pin output to one stable format so capture side doesn't see format/rate churn.
    output_rate = 48000;
    output_format = "S16_LE";
    output_channels = 2;
    use_mmap_if_available = "no";
  };

  metadata = {
    enabled = "yes";
    include_cover_art = "yes";
    pipe_name = "/tmp/shairport-sync-metadata";
  };
