  general = {
    name = "Audioleaf Pi";
    output_backend = "alsa";
    // Use the low-power interpolation path to avoid expensive soxr processing.
    interpolation = "vernier";
    // Audioleaf visualizer only needs stereo capture; disable multichannel AP2 paths.
    six_channel_mode = "off";
    eight_channel_mode = "off";
    // Force any multichannel AirPlay 2 stream to a predictable stereo path.
    mixdown = "stereo";
    output_channel_mapping = "auto";
    // Do not apply AirPlay volume changes on this endpoint.
    // Useful when this receiver is only feeding a visualizer loopback path.
    ignore_volume_control = "yes";
    // Sync trim versus other AirPlay endpoints/amplifiers.
    // Positive delays this device; negative makes it earlier.
    // Keep within about +/-0.25.
    audio_backend_latency_offset_in_seconds = 0.0;
    // Increase backend buffer modestly to reduce dropouts/XRUNs on busy Pi/network links.
    audio_backend_buffer_desired_length_in_seconds = 0.4;
    // AP2 decoded buffer target (default is 1.0s; keep explicit for clarity).
    audio_decoded_buffer_desired_length_in_seconds = 1.0;
    // Loosen drift correction slightly for visualizer-only usage.
    drift_tolerance_in_seconds = 0.004;
    resync_threshold_in_seconds = 0.100;
  };

  alsa = {
    output_device = "hw:Loopback,0,0";
    // Pin output to one stable format so capture side doesn't see format/rate churn.
    // Audioleaf's loopback capture path prefers 44.1kHz / 16-bit / stereo on Linux.
    output_rate = 44100;
    output_format = "S16_LE";
    output_channels = 2;
    use_mmap_if_available = "no";
    // Prefer compatibility over precision timing in loopback-only visualizer setups.
    use_precision_timing = "no";
  };

  metadata = {
    enabled = "yes";
    include_cover_art = "yes";
    pipe_name = "/tmp/shairport-sync-metadata";
  };

  // Enable temporarily while tuning; then disable to reduce log volume.
  // diagnostics = {
  //   statistics = "yes";
  //   log_verbosity = 1;
  // };
