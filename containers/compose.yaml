# Podman compose for audioleaf on Raspberry Pi.
#
# For systemd integration we ship a Quadlet at containers/audioleaf.container —
# this compose file is for ad-hoc / dev runs without systemd.
#
# Pi prerequisites are handled by pi/setup.sh, but if you're doing it by hand:
#   echo snd-aloop | sudo tee /etc/modules-load.d/snd-aloop.conf
#   echo "options snd-aloop id=Loopback index=2 pcm_substreams=8" \
#     | sudo tee /etc/modprobe.d/snd-aloop.conf
#   sudo modprobe snd-aloop
#
# Run:
#   podman compose -f containers/compose.yaml up -d

services:
  audioleaf:
    image: ghcr.io/weekendsuperhero/audioleaf:latest
    container_name: audioleaf
    network_mode: host
    restart: unless-stopped
    # nqptp binds UDP 319/320 for PTP; shairport needs NET_ADMIN for RT scheduling
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    volumes:
      - ${AUDIOLEAF_CONFIG_DIR:-./config}:/root/.config/audioleaf
